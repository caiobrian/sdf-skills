name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown files exist
        run: |
          files=(
            "skills/sdf/SKILL.md"
            "skills/sdf/phases/discover.md"
            "skills/sdf/phases/spec.md"
            "skills/sdf/phases/build.md"
            "skills/sdf/phases/quick.md"
            "skills/sdf/phases/verify.md"
            "skills/sdf/phases/document.md"
            "skills/sdf/templates/tasks.md"
            "skills/sdf/templates/requirements.md"
            "skills/sdf/templates/plan.md"
            "skills/sdf-setup/SKILL.md"
            "README.md"
          )
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"

  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --include-fragments "**/*.md"
          fail: false
